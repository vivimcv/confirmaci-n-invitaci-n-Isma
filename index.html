<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación a mi cumple</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(180deg, #0f172a, #1e293b);
        color: white;
        text-align: center;
    }

    .container {
        padding: 20px;
    }

    h1 {
        font-size: 32px;
        color: #facc15;
        text-shadow: 2px 2px 10px black;
    }

    .countdown {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin: 20px 0;
        flex-wrap: wrap;
    }

    .box {
        background: #111827;
        padding: 15px;
        border-radius: 15px;
        width: 80px;
        box-shadow: 0 0 15px rgba(255,255,255,0.2);
    }

    .number {
        font-size: 28px;
        font-weight: bold;
        color: #38bdf8;
    }

    .label {
        font-size: 12px;
    }

    .info {
        margin-top: 20px;
        font-size: 16px;
    }

    .btn {
        display: inline-block;
        margin-top: 20px;
        padding: 15px 25px;
        background: #22c55e;
        color: white;
        border-radius: 10px;
        text-decoration: none;
        font-weight: bold;
    }

    .btn:hover {
        background: #16a34a;
    }
</style>
</head>

<body>

<div class="container">
    <h1>🎉 INVITACIÓN A MI CUMPLE 🎉</h1>

    <h2>⏳ ¡Faltan!</h2>

    <div class="countdown">
        <div class="box">
            <div class="number" id="days">00</div>
            <div class="label">DÍAS</div>
        </div>
        <div class="box">
            <div class="number" id="hours">00</div>
            <div class="label">HORAS</div>
        </div>
        <div class="box">
            <div class="number" id="minutes">00</div>
            <div class="label">MIN</div>
        </div>
        <div class="box">
            <div class="number" id="seconds">00</div>
            <div class="label">SEG</div>
        </div>
    </div>

    <div class="info">
        📅 <b>04 de abril de 2026</b><br>
        ⏰ <b>01:00 pm</b><br><br>

        📍 Embarcadero Las Flores Nativitas<br>
        Canal 236, San Jerónimo, Xochimilco,<br>
        16090, Ciudad de México
    </div>

    <a class="btn" href="https://www.google.com/maps/search/?api=1&query=Canal+236+San+Jerónimo+Xochimilco+16090" target="_blank">
        📍 ABRIR EN MAPS
    </a>

    <div style="margin-top: 30px;">
        🎵 Sunflower - Post Malone 🎵
    </div>
</div>

<script>
    const eventDate = new Date("April 4, 2026 13:00:00").getTime();

    const countdown = setInterval(() => {
        const now = new Date().getTime();
        const distance = eventDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((distance / 1000 / 60) % 60);
        const seconds = Math.floor((distance / 1000) % 60);

        document.getElementById("days").innerHTML = days;
        document.getElementById("hours").innerHTML = hours;
        document.getElementById("minutes").innerHTML = minutes;
        document.getElementById("seconds").innerHTML = seconds;

        if (distance < 0) {
            clearInterval(countdown);
            document.querySelector(".countdown").innerHTML = "🎉 ¡YA ES HOY! 🎉";
        }
    }, 1000);
</script>

</body>
</html>
